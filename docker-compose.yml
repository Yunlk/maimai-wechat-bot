services:
  # ============= maimaiDX 查分机器人 =============
  maimai-bot:
    build: .
    container_name: maimai-bot
    restart: unless-stopped
    # 长连接模式：WebSocket 向外连接，无需暴露端口
    env_file:
      - .env
    volumes:
      - ./static:/app/static:ro    # 静态资源（曲绘、字体等）只读挂载
      - bot_data:/app/static/data  # 数据文件读写
      - bot_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  bot_data:
  bot_logs:
